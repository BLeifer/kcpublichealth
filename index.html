<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KC Public Health - Kansas City Health Data & Resources</title>
  <meta name="description" content="Real-time COVID-19, health behavior, and social determinant data for Kansas City, Missouri. Research-backed public health information.">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
      color: #1e293b;
    }

    .header {
      border-bottom: 1px solid #e2e8f0;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(4px);
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .header-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
    }

    .header-title h1 {
      font-size: 2.25rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0.25rem;
    }

    .header-title p {
      font-size: 0.875rem;
      color: #64748b;
    }

    .header-buttons {
      display: flex;
      gap: 0.75rem;
    }

    .btn {
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .btn-secondary:hover {
      background: #cbd5e1;
    }

    .btn-primary {
      background: #ea580c;
      color: white;
    }

    .btn-primary:hover {
      background: #c2410c;
    }

    .location-filter {
      display: flex;
      gap: 0.75rem;
      background: #f1f5f9;
      padding: 1rem;
      border-radius: 0.5rem;
      align-items: center;
    }

    .location-filter select {
      padding: 0.5rem 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 0.5rem;
      background: white;
      color: #0f172a;
      font-weight: 500;
      cursor: pointer;
    }

    .main-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .section {
      background: white;
      border-radius: 0.5rem;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }

    .section-header {
      width: 100%;
      padding: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      background: white;
      border: none;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .section-header:hover {
      background: #f8fafc;
    }

    .section-header-content {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }

    .section-header-text h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0f172a;
    }

    .section-header-text p {
      font-size: 0.875rem;
      color: #64748b;
    }

    .chevron {
      width: 1.25rem;
      height: 1.25rem;
      color: #64748b;
      transition: transform 0.2s;
      flex-shrink: 0;
      stroke: currentColor;
    }

    .chevron.rotated {
      transform: rotate(180deg);
    }

    .section-content {
      padding: 2rem;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .metric-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      padding: 1rem;
    }

    .metric-card p {
      font-size: 0.875rem;
      color: #64748b;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .metric-value {
      font-size: 1.875rem;
      font-weight: 700;
      color: #0f172a;
      margin-top: 0.5rem;
    }

    .comparison-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
      margin-top: 0.5rem;
    }

    .badge-good {
      background: #dcfce7;
      color: #166534;
    }

    .badge-warning {
      background: #fed7aa;
      color: #9a3412;
    }

    .alert {
      border-radius: 0.5rem;
      padding: 1.5rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
    }

    .alert h3 {
      color: #7f1d1d;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .alert p, .alert li {
      color: #991b1b;
      font-size: 0.875rem;
    }

    .alert ul {
      margin-left: 1rem;
      margin-top: 0.5rem;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal {
      background: white;
      border-radius: 0.5rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      max-width: 448px;
      width: 100%;
      padding: 2rem;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h3 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0.25rem;
    }

    .modal-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .form-group label {
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.25rem;
      display: block;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-family: inherit;
      font-size: 1rem;
      width: 100%;
    }

    .form-group textarea {
      resize: none;
      min-height: 100px;
    }

    .modal-buttons {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .modal-buttons button {
      flex: 1;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.5rem;
      font-weight: 500;
      cursor: pointer;
    }

    .modal-buttons .btn-submit {
      background: #ea580c;
      color: white;
    }

    .modal-buttons .btn-submit:hover {
      background: #c2410c;
    }

    .modal-buttons .btn-cancel {
      background: #e5e7eb;
      color: #0f172a;
    }

    .modal-buttons .btn-cancel:hover {
      background: #d1d5db;
    }

    .footer {
      border-top: 1px solid #e2e8f0;
      padding-top: 2rem;
      padding-bottom: 1rem;
    }

    .footer p {
      font-size: 0.75rem;
      color: #64748b;
      text-align: center;
    }

    svg {
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
